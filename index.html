<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager
    </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Adicionar Tarefa</h2>
        <form action="" id="adicionarTarefa">
        <input type="text" name="tarefa" id="tarefa" placeholder="Digite aqui a tarefa a ser adicionada">
        <input type="submit" value="Adicionar" id="adicionar">
        </form>
    </div>

    <div class="container">
        <h2>Minhas Tarefas</h2>
        <ul id="listaAFazer">
        </ul>

    </div>

    <div class="container">
        <h2>Tarefas Realizadas</h2>
        <ul id="listaRealizadas">
        </ul>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
